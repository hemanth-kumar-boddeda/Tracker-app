<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Fitness Tracker</title>
<style>
body { font-family: Arial; background:#0f172a; color:white; padding:15px; }
h1 { text-align:center; }
.section { margin-bottom:20px; padding:15px; border-radius:12px; background:#1e293b; }
label { display:block; margin:8px 0; }
input[type="checkbox"] { margin-right:10px; }
input, button { padding:8px; border-radius:8px; border:none; margin-top:5px; }
button { background:#38bdf8; color:black; font-weight:bold; margin:5px 5px 0 0; }
.progress { background:#334155; border-radius:10px; overflow:hidden; margin-top:10px; }
.progress-bar { height:10px; background:#38bdf8; width:0%; }
</style>
</head>
<body><h1>🔥 Ultimate Tracker</h1><div class="section">
<h2>📊 Daily Calories</h2>
<label>Calories Consumed: <input type="number" id="calories"></label>
<label>Protein (g): <input type="number" id="protein"></label>
<div class="progress"><div class="progress-bar" id="progress"></div></div>
</div><div class="section">
<h2>💪 Habits</h2>
<div id="habits"></div>
<button onclick="addHabit()">➕ Add Habit</button>
</div><div class="section">
<h2>🧴 Skincare</h2>
<div id="skincare"></div>
<button onclick="addSkincare()">➕ Add Skincare</button>
</div><div class="section">
<h2>💊 Supplements</h2>
<div id="supplements"></div>
<button onclick="addSupplement()">➕ Add Supplement</button>
</div><div class="section">
<h2>⚙️ Controls</h2>
<button onclick="saveData()">💾 Save</button>
<button onclick="resetData()">🔄 Reset</button>
</div><script>
const defaultHabits = ["Wake up","Breakfast","Lunch","Workout","Dinner","Sleep"];
const defaultSkin = ["Morning routine","After gym wash","Night routine"];
const defaultSupp = ["Whey","Creatine","Multivitamin","Fish Oil"];

function renderList(id, data) {
  const container = document.getElementById(id);
  container.innerHTML = '';
  data.forEach((item, index) => {
    container.innerHTML += `
      <label>
        <input type="checkbox" id="${id}-${index}"> ${item}
        <button onclick="deleteItem('${id}',${index})">❌</button>
      </label>`;
  });
}

function addItem(id) {
  const name = prompt("Enter name");
  if(!name) return;
  let data = JSON.parse(localStorage.getItem(id)) || [];
  data.push(name);
  localStorage.setItem(id, JSON.stringify(data));
  renderAll();
}

function deleteItem(id,index){
  let data = JSON.parse(localStorage.getItem(id)) || [];
  data.splice(index,1);
  localStorage.setItem(id, JSON.stringify(data));
  renderAll();
}

function addHabit(){ addItem('habits'); }
function addSkincare(){ addItem('skincare'); }
function addSupplement(){ addItem('supplements'); }

function saveData(){
  const inputs = document.querySelectorAll('input');
  inputs.forEach(i=>{
    if(i.type==='checkbox') localStorage.setItem(i.id,i.checked);
    else localStorage.setItem(i.id,i.value);
  });
  alert('Saved!');
}

function loadData(){
  const inputs = document.querySelectorAll('input');
  inputs.forEach(i=>{
    if(i.type==='checkbox') i.checked = localStorage.getItem(i.id)==='true';
    else i.value = localStorage.getItem(i.id)||'';
  });
  updateProgress();
}

function resetData(){
  localStorage.clear();
  location.reload();
}

function updateProgress(){
  const cal = document.getElementById('calories').value || 0;
  const percent = Math.min((cal/2800)*100,100);
  document.getElementById('progress').style.width = percent + '%';
}

document.getElementById('calories').addEventListener('input',updateProgress);

function renderAll(){
  let h = JSON.parse(localStorage.getItem('habits')) || defaultHabits;
  let s = JSON.parse(localStorage.getItem('skincare')) || defaultSkin;
  let su = JSON.parse(localStorage.getItem('supplements')) || defaultSupp;
  renderList('habits',h);
  renderList('skincare',s);
  renderList('supplements',su);
}

window.onload = ()=>{
  renderAll();
  loadData();
};
</script></body>
</html>
